<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>精确修改片段区间 - 增强控制版</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        :root { --bg: #0f0f0f; --panel: #1a1a1a; --accent: #3498db; --text: #eee; }
        body { font-family: 'PingFang SC', sans-serif; background: var(--bg); color: var(--text); padding: 40px; display: flex; flex-direction: column; align-items: center; }
        
        .editor-container { width: 100%; max-width: 900px; background: var(--panel); padding: 30px; border-radius: 12px; border: 1px solid #333; }
        video { width: 100%; aspect-ratio: 16/9; background: #000; border-radius: 8px; margin-bottom: 10px; }

        /* 快进后退按钮样式 */
        .skip-controls {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 20px;
        }
        .skip-btn {
            background: #2a2a2a;
            border: 1px solid #444;
            color: #aaa;
            padding: 6px 15px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 13px;
            transition: 0.2s;
            font-family: monospace;
        }
        .skip-btn:hover {
            background: #444;
            color: #fff;
            border-color: var(--accent);
        }

        .time-capture { 
            display: flex; gap: 15px; align-items: center; 
            background: #252525; padding: 15px; border-radius: 8px; margin-bottom: 20px; 
            border: 1px solid #444;
        }
        .capture-val { flex: 1; font-family: monospace; font-size: 18px; color: var(--accent); }
        .time-capture button { background: #444; color: white; border: none; padding: 8px 15px; border-radius: 4px; cursor: pointer; font-weight: bold; }

        .form-row { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 20px; margin-top: 20px; }
        label { display: block; font-size: 12px; color: #888; margin-bottom: 5px; }
        select, input { width: 100%; padding: 12px; background: #252525; border: 1px solid #444; color: #fff; border-radius: 6px; box-sizing: border-box; }
        
        #pose-preview-box { margin-top:15px; background: #222; padding: 12px; border-radius: 8px; border: 1px dashed #444; }
        #pose-preview-thumbs { display: flex; gap: 8px; overflow-x: auto; padding-bottom: 5px; }
        #pose-preview-thumbs img { height: 70px; aspect-ratio: 16/9; object-fit: cover; border-radius: 4px; border: 1px solid #555; flex-shrink: 0; cursor: pointer; }

        .save-btn { width: 100%; margin-top: 30px; padding: 15px; background: #2ecc71; border: none; color: white; border-radius: 8px; font-weight: bold; font-size: 16px; cursor: pointer; }
        /* 倍速按钮样式 */
.speed-btn {
    background: transparent;
    border: none;
    color: #666;
    padding: 4px 10px;
    border-radius: 3px;
    cursor: pointer;
    font-size: 11px;
    font-weight: bold;
    transition: 0.2s;
}

.speed-btn:hover {
    color: #ccc;
}

/* 激活状态：蓝色背景 */
.speed-btn.active {
    background: var(--accent) !important;
    color: white !important;
}
    </style>
</head>
<body>

<div class="editor-container">
    <h2 id="v-title" style="margin-top:0; color: var(--accent);">精确修改片段</h2>
    
    <video id="video" controls crossorigin="anonymous"></video>

    <!-- 【新增】快进快退控制组 -->
    <div class="skip-controls">
        <button class="skip-btn" onclick="skipTime(-10)">-10s</button>
        <button class="skip-btn" onclick="skipTime(-5)">-5s</button>
        <button class="skip-btn" onclick="skipTime(5)">+5s</button>
        <button class="skip-btn" onclick="skipTime(10)">+10s</button>
          <button class="speed-btn" onclick="changeSpeed(0.5, this)">0.5x</button>
        <button class="speed-btn" onclick="changeSpeed(0.75, this)">0.75x</button>
        <button class="speed-btn active" id="default-speed" onclick="changeSpeed(1.0, this)">1x</button>
       
    </div>

    <div class="time-capture">
        <div class="capture-val">区间: <span id="start-val">00:00</span> - <span id="end-val">00:00</span></div>
        <button onclick="capture('start')">设为开始</button>
        <button onclick="capture('end')">设为结束</button>
    </div>

    <div class="form-row">
        <div>
            <label>人种 (Race)</label>
            <select id="race-sel" onchange="updateActorLinkage()"></select>
        </div>
        <div>
            <label>演员 (Actor)</label>
            <select id="actor-sel" onchange="updatePoseLinkage()"></select>
        </div>
        <div>
            <label>姿势 (Pose)</label>
            <select id="pose-sel" onchange="showPosePreview()"></select>
        </div>
    </div>

    <div id="pose-preview-box" style="display:none;">
        <div style="font-size: 11px; color: #888; margin-bottom: 8px;">该演员的历史【参考姿势】:</div>
        <div id="pose-preview-thumbs"></div>
    </div>

    <div style="margin-top:20px;">
        <label>片段描述</label>
        <input type="text" id="desc-input">
    </div>

    <button class="save-btn" onclick="updateMarker()">保存所有修改</button>
</div>

<script>
    const API = 'http://localhost:3000';
    const params = new URLSearchParams(window.location.search);
    const markerId = params.get('id');
    
    let startTime = 0;
    let endTime = 0;
    let globalConfig = {};
    const video = document.getElementById('video');

    window.onload = async () => {
        if (!markerId) return alert("未提供标记ID");
        globalConfig = await fetch(`${API}/api/config`).then(r => r.json());
        fillSelect('race-sel', globalConfig.races);

        const res = await fetch(`${API}/api/marker/${markerId}`).then(r => r.json());
        if (res.success) {
            const m = res.data;
            document.getElementById('v-title').innerText = "编辑: " + m.video_path.split('\\').pop();
            startTime = m.time;
            endTime = m.end_time || m.time;
            document.getElementById('start-val').innerText = formatTime(startTime);
            document.getElementById('end-val').innerText = formatTime(endTime);
            document.getElementById('desc-input').value = m.description || '';
            document.getElementById('race-sel').value = m.race;
            updateActorLinkage();
            document.getElementById('actor-sel').value = m.actor;
            updatePoseLinkage();
            document.getElementById('pose-sel').value = m.pose;
            showPosePreview();

            const videoUrl = `${API}/content/${m.relativeUrl}`;
            if (m.type === 'm3u8') {
                const hls = new Hls(); hls.loadSource(videoUrl); hls.attachMedia(video);
                hls.on(Hls.Events.MANIFEST_PARSED, () => video.currentTime = startTime);
            } else {
                video.src = videoUrl;
                video.onloadedmetadata = () => video.currentTime = startTime;
            }
        }
    };

    // 【新增】跳转逻辑
    function skipTime(seconds) {
        if (!video) return;
        let newTime = video.currentTime + seconds;
        if (newTime < 0) newTime = 0;
        if (newTime > video.duration) newTime = video.duration;
        video.currentTime = newTime;
    }
    /**
 * 修改编辑页视频播放倍速
 * @param {number} rate 倍率
 * @param {HTMLElement} btn 点击的按钮元素
 */
function changeSpeed(rate, btn) {
    if (!video) return;
    
    // 设置倍速
    video.playbackRate = rate;
    
    // UI 状态切换
    document.querySelectorAll('.speed-btn').forEach(b => b.classList.remove('active'));
    if (btn) {
        btn.classList.add('active');
    }
    
    console.log("编辑页当前倍速:", rate);
}

// 进阶：键盘快捷键支持 (可选，按 [ 减速，按 ] 加速)
document.addEventListener('keydown', (e) => {
    if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;

    if (e.key === '[') {
        const s05 = document.querySelector('.speed-btn[onclick*="0.5"]');
        changeSpeed(0.5, s05);
    } else if (e.key === ']') {
        const s10 = document.getElementById('default-speed');
        changeSpeed(1.0, s10);
    }
});

    async function showPosePreview() {
        const actor = document.getElementById('actor-sel').value;
        const pose = document.getElementById('pose-sel').value;
        const box = document.getElementById('pose-preview-box');
        const container = document.getElementById('pose-preview-thumbs');
        if (!actor || !pose) { box.style.display = 'none'; return; }
        try {
            const res = await fetch(`${API}/api/pose-preview?actor=${encodeURIComponent(actor)}&pose=${encodeURIComponent(pose)}`).then(r => r.json());
            if (res.success && res.data.length > 0) {
                container.innerHTML = '';
                box.style.display = 'block';
                res.data.forEach(item => {
                    const img = document.createElement('img');
                    img.src = item.thumbnail;
                    img.onclick = () => window.open(item.thumbnail);
                    container.appendChild(img);
                });
            } else { box.style.display = 'none'; }
        } catch (e) { console.error(e); }
    }

    function capture(type) {
        const t = video.currentTime;
        if (type === 'start') { startTime = t; document.getElementById('start-val').innerText = formatTime(t); }
        else { endTime = t; document.getElementById('end-val').innerText = formatTime(t); }
    }

    async function updateMarker() {
        if (endTime <= startTime) return alert("结束时间必须大于开始时间");
        const payload = {
            time: startTime, end_time: endTime,
            race: document.getElementById('race-sel').value,
            actor: document.getElementById('actor-sel').value,
            pose: document.getElementById('pose-sel').value,
            description: document.getElementById('desc-input').value
        };
        const res = await fetch(`${API}/api/markers/${markerId}`, {
            method: 'PUT',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify(payload)
        }).then(r => r.json());
        if (res.success) {
            alert("更新成功");
            if (window.opener && window.opener.loadMarkers) window.opener.loadMarkers();
            window.close();
        }
    }

    function fillSelect(id, data) {
        const sel = document.getElementById(id);
        sel.innerHTML = '<option value="">--请选择--</option>';
        data.forEach(i => sel.innerHTML += `<option value="${i.name}">${i.name}</option>`);
    }

    function updateActorLinkage() {
        const race = document.getElementById('race-sel').value;
        const actorSel = document.getElementById('actor-sel');
        actorSel.innerHTML = '<option value="">--演员--</option>';
        globalConfig.actors.filter(a => a.race_name === race).forEach(a => actorSel.innerHTML += `<option value="${a.name}">${a.name}</option>`);
        updatePoseLinkage();
    }

    function updatePoseLinkage() {
        const actor = document.getElementById('actor-sel').value;
        const poseSel = document.getElementById('pose-sel');
        poseSel.innerHTML = '<option value="">--姿势--</option>';
        globalConfig.poses.filter(p => p.actor_name === actor).forEach(p => poseSel.innerHTML += `<option value="${p.name}">${p.name}</option>`);
        showPosePreview();
    }

    function formatTime(s) {
        const m = Math.floor(s / 60); const sec = Math.floor(s % 60);
        return `${m}:${sec.toString().padStart(2, '0')}`;
    }
</script>
</body>
</html>
